<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="6" r="1" fill="rgba(255,255,255,0.04)"/>
      <circle cx="18" cy="18" r="1" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#1a1a2e"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Pixel castle, large, centered top -->
  <g transform="translate(490, 70) scale(14)">
    <rect x="2" y="4" width="2" height="2" fill="#f0e6d3"/>
    <rect x="6" y="3" width="2" height="3" fill="#f0e6d3"/>
    <rect x="10" y="3" width="2" height="3" fill="#f0e6d3"/>
    <rect x="13" y="4" width="2" height="2" fill="#f0e6d3"/>
    <rect x="2" y="6" width="13" height="6" fill="#f0e6d3"/>
    <rect x="7" y="9" width="3" height="3" fill="#1a1a2e"/>
    <rect x="4" y="8" width="1" height="1" fill="#8b5cf6"/>
    <rect x="11" y="8" width="1" height="1" fill="#eab308"/>
  </g>

  <!-- Title -->
  <text x="600" y="430" text-anchor="middle"
        font-family="'Press Start 2P', monospace" font-size="68"
        fill="#f0e6d3" letter-spacing="4">BIAS DUNGEON</text>

  <!-- Tagline -->
  <text x="600" y="490" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="28"
        fill="#d8ccb1">Five rooms. Five mental traps.</text>
  <text x="600" y="525" text-anchor="middle"
        font-family="'Inter', sans-serif" font-size="28"
        fill="#d8ccb1">Spot the trick before it spots you.</text>

  <!-- Accent badge -->
  <rect x="500" y="555" width="200" height="36" fill="#8b5cf6"/>
  <text x="600" y="580" text-anchor="middle"
        font-family="'Press Start 2P', monospace" font-size="14"
        fill="#0f0f1a" letter-spacing="2">~ 5 MIN RUN</text>
</svg>
